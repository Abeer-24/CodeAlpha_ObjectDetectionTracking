[phases.setup]
nixPkgs = ["python311", "libGL", "glib", "xorg.libxcb", "curl"]

[phases.install]
cmds = [
    "curl https://bootstrap.pypa.io/get-pip.py -o get-pip.py && python3.11 get-pip.py",
    "python3.11 -m pip install setuptools==69.5.1",
    "python3.11 -m pip install ultralytics>=8.4.0 deep-sort-realtime>=1.3.2 opencv-python-headless>=4.8.0 numpy fastapi>=0.100.0 python-multipart uvicorn",
    "python3.11 -m pip install --force-reinstall 'opencv-python-headless>=4.8.0' --no-deps"
]

[start]
cmd = "python3.11 -m uvicorn server:app --host 0.0.0.0 --port $PORT"